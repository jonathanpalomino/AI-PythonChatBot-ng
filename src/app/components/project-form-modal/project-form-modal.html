<div class="modal-overlay" (click)="close.emit()">
    <div class="modal-container" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h2>{{ projectToEdit ? 'Editar Proyecto' : 'Nuevo Proyecto' }}</h2>
            <button class="btn-icon" (click)="close.emit()">
                <i class="icon-x"></i>
            </button>
        </div>

        <div class="modal-body">
            <div class="form-group">
                <label for="name">Nombre del Proyecto <span class="required">*</span></label>
                <input type="text" id="name" [(ngModel)]="name" placeholder="Ej: Reporte Financiero Q1"
                    [class.error]="error && !name" (keyup.enter)="onSubmit()" autofocus>
            </div>

            <div class="form-group">
                <label for="description">Descripción</label>
                <textarea id="description" [(ngModel)]="description" rows="3"
                    placeholder="Descripción opcional del proyecto..."></textarea>
            </div>

            <div *ngIf="error" class="error-message">
                <i class="icon-alert-circle"></i>
                <span>{{ error }}</span>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-secondary" (click)="close.emit()" [disabled]="isSubmitting">Cancelar</button>
            <button class="btn-primary" (click)="onSubmit()" [disabled]="isSubmitting || !name.trim()">
                <span *ngIf="isSubmitting" class="spinner"></span>
                {{ projectToEdit ? 'Guardar Cambios' : 'Crear Proyecto' }}
            </button>
        </div>
    </div>
</div>
