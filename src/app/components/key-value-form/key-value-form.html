<!-- src/app/components/key-value-form/key-value-form.html -->
<div class="key-value-form" [class.disabled]="disabled">
    <div class="form-header" *ngIf="showHeaders">
        <h4>{{ title }}</h4>
        <div class="form-actions">
            <button type="button" (click)="clearError()" *ngIf="error" class="btn btn-small btn-clear-error"
                title="Clear error">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <!-- Error message -->
    <div *ngIf="error" class="error-message">
        <i class="fas fa-exclamation-circle"></i>
        {{ error }}
    </div>

    <!-- Add new item form -->
    <div class="add-item-form">
        <div class="form-row">
            <div class="form-group">
                <label [attr.for]="'new-key'">
                    {{ keyLabel }}
                </label>
                <input id="new-key" type="text" [(ngModel)]="newKey" [placeholder]="keyPlaceholder"
                    [disabled]="disabled" (keydown.enter)="addItem()" class="key-input" />
            </div>

            <div class="form-group">
                <label [attr.for]="'new-value'">
                    {{ valueLabel }}
                </label>
                <input id="new-value" type="text" [(ngModel)]="newValue" [placeholder]="valuePlaceholder"
                    [disabled]="disabled" (keydown.enter)="addItem()" class="value-input" />
            </div>

            <div class="form-group actions">
                <button type="button" (click)="addItem()" [disabled]="!canAddItem() || disabled"
                    class="btn btn-small btn-secondary add-btn"
                    [title]="canAddItem() ? 'Add ' + keyLabel.toLowerCase() + '-' + valueLabel.toLowerCase() : 'Fill in the fields to add'">
                    <i class="fas fa-plus"></i>
                    {{ addButtonText }}
                </button>
            </div>
        </div>
    </div>

    <!-- Items list -->
    <div *ngIf="hasItems()" class="items-list">
        <div class="list-header" *ngIf="showHeaders">
            <span class="header-key">{{ keyLabel }}</span>
            <span class="header-value">{{ valueLabel }}</span>
            <span class="header-actions">{{ removeButtonText }}</span>
        </div>

        <div *ngFor="let item of items; let i = index" class="item-row">
            <div class="item-key">
                <input type="text" [value]="item.key" (input)="updateItem(i, 'key', $event.target.value)"
                    [disabled]="disabled" [placeholder]="keyPlaceholder" class="key-input" />
            </div>

            <div class="item-value">
                <input type="text" [value]="item.value" (input)="updateItem(i, 'value', $event.target.value)"
                    [disabled]="disabled" [placeholder]="valuePlaceholder" class="value-input" />
            </div>

            <div class="item-actions">
                <button type="button" (click)="removeItem(i)" [disabled]="disabled"
                    class="btn btn-small btn-danger remove-btn"
                    [title]="'Remove ' + keyLabel.toLowerCase() + '-' + valueLabel.toLowerCase()">
                    <i class="fas fa-trash"></i>
                    {{ removeButtonText }}
                </button>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div *ngIf="!hasItems() && !disabled" class="empty-state">
        <p>No {{ title.toLowerCase() }} added yet.</p>
        <p class="hint">Add your first {{ keyLabel.toLowerCase() }}-{{ valueLabel.toLowerCase() }} pair above.</p>
    </div>
</div>
